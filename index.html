<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>DriveNav</title>
  <meta name="theme-color" content="#0f172a" />
<link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <style>
    :root {
      --bg: #0b1220;
      --bg-soft: #131c31;
      --card: rgba(255,255,255,0.06);
      --card-border: rgba(255,255,255,0.08);
      --text: #f8fafc;
      --muted: #a5b4fc;
      --subtle: #94a3b8;
      --primary: #3b82f6;
      --primary-2: #2563eb;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --shadow: 0 20px 40px rgba(0,0,0,0.35);
      --radius: 22px;
      --radius-sm: 16px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(59,130,246,0.18), transparent 28%),
        radial-gradient(circle at top left, rgba(16,185,129,0.12), transparent 22%),
        linear-gradient(180deg, #0b1220 0%, #0f172a 100%);
      color: var(--text);
    }

    body {
      padding: max(16px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom));
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .hero {
      background: linear-gradient(135deg, rgba(37,99,235,0.32), rgba(15,23,42,0.85));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .hero h1 {
      margin: 0 0 6px;
      font-size: 32px;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .hero p {
      margin: 0;
      color: #dbeafe;
      font-size: 15px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      color: #dbeafe;
      font-size: 13px;
      font-weight: 800;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 10px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .search {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border-radius: 18px;
      min-height: 56px;
      padding: 0 18px;
      font-size: 17px;
      outline: none;
    }

    .search::placeholder,
    .input::placeholder,
    .textarea::placeholder { color: #cbd5e1; }

    .btn {
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border-radius: 18px;
      min-height: 56px;
      padding: 0 18px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: transform .15s ease, background .15s ease, border-color .15s ease;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(1px); }

    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-2)); border-color: transparent; }
    .btn-success { background: linear-gradient(135deg, #10b981, #059669); border-color: transparent; }
    .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); border-color: transparent; }
    .btn-warning { background: linear-gradient(135deg, #f59e0b, #d97706); border-color: transparent; }

    .mini-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .stat {
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .stat-value {
      display: block;
      font-size: 26px;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .stat-label {
      color: #cbd5e1;
      font-size: 13px;
      font-weight: 700;
    }

    .form-card { display: none; }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .input, .textarea {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 16px;
      outline: none;
    }

    .textarea {
      grid-column: 1 / -1;
      min-height: 88px;
      resize: vertical;
    }

    .form-actions {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(59,130,246,0.16);
      border: 1px solid rgba(59,130,246,0.22);
      color: #dbeafe;
      font-size: 13px;
      font-weight: 800;
    }

    .group-list { display: grid; gap: 16px; }
    .group { display: grid; gap: 12px; }

    .group-letter {
      position: sticky;
      top: 10px;
      z-index: 2;
      width: fit-content;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(15,23,42,0.9);
      border: 1px solid rgba(255,255,255,0.08);
      color: #bfdbfe;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    .student {
      display: grid;
      gap: 14px;
      padding: 18px;
      border-radius: 22px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .student-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .student-name {
      margin: 0 0 6px;
      font-size: 22px;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .student-meta {
      display: grid;
      gap: 6px;
      color: #cbd5e1;
      font-size: 15px;
    }

    .student-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .student-actions .btn {
      min-height: 52px;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      text-decoration: none;
      font-weight: 800;
    }

    .empty {
      padding: 28px 18px;
      border-radius: 20px;
      text-align: center;
      color: #cbd5e1;
      border: 2px dashed rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.03);
    }

    .footer-note {
      text-align: center;
      color: #94a3b8;
      font-size: 13px;
      padding-bottom: 8px;
    }

    @media (max-width: 760px) {
      .toolbar { grid-template-columns: 1fr 1fr; }
      .mini-grid, .form-grid, .form-actions, .student-actions { grid-template-columns: 1fr; }
      .hero-top { flex-direction: column; }
      .hero h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <div class="hero-top">
        <div>
          <h1>DriveNav</h1>
          <p>Premium telefoonboek voor rijinstructeurs. Snel zoeken, tikken en rijden.</p>
        </div>
        <div class="badge">⚡ Premium modus</div>
      </div>
      <div class="toolbar">
        <input id="search" class="search" placeholder="Zoek leerling op naam, adres of telefoon..." />
        <button class="btn" id="voiceBtn" onclick="voiceSearch()">🎤 Spraak</button>
        <button class="btn" onclick="focusFavorites()">⭐ Favorieten</button>
        <button class="btn btn-primary" id="installBtn" onclick="installDriveNav()" style="display:none">📲 Installeer</button>
        <button class="btn btn-primary" onclick="toggleForm()">+ Toevoegen</button>
      </div>
    </section>

    <section class="card">
      <div class="mini-grid">
        <div class="stat">
          <span class="stat-value" id="statTotal">0</span>
          <span class="stat-label">Leerlingen</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="statFav">0</span>
          <span class="stat-label">Favorieten</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="statFiltered">0</span>
          <span class="stat-label">In beeld</span>
        </div>
      </div>
    </section>

    <section class="card form-card" id="formBox">
      <div class="section-head">
        <h2 id="formTitle">Nieuwe leerling</h2>
        <span class="pill">Supabase live</span>
      </div>
      <div class="form-grid">
        <input id="name" class="input" placeholder="Naam" />
        <input id="phone" class="input" placeholder="Telefoonnummer (optioneel)" />
        <input id="address" class="input" style="grid-column:1 / -1" placeholder="Adres" />
        <textarea id="note" class="textarea" placeholder="Notitie (optioneel)"></textarea>
        <div class="form-actions">
          <button class="btn btn-success" onclick="saveStudent()">Opslaan</button>
          <button class="btn" onclick="clearAndCloseForm()">Annuleren</button>
          <button class="btn" onclick="fillDemoForm()">Demo invullen</button>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="section-head">
        <h2>Jouw leerlingen</h2>
        <span class="pill" id="countPill">0 leerlingen</span>
      </div>
      <div id="list" class="group-list"></div>
    </section>

    <div class="footer-note">DriveNav Premium — online, mobiel en klaar voor Vercel.</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://yfnbycxrssanykhohqdx.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_KG5-rmYz84zw_Qc_VkETEw_fyHUW59J';

    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const els = {
      search: document.getElementById('search'),
      voiceBtn: document.getElementById('voiceBtn'),
      formBox: document.getElementById('formBox'),
      formTitle: document.getElementById('formTitle'),
      name: document.getElementById('name'),
      address: document.getElementById('address'),
      phone: document.getElementById('phone'),
      note: document.getElementById('note'),
      list: document.getElementById('list'),
      countPill: document.getElementById('countPill'),
      statTotal: document.getElementById('statTotal'),
      statFav: document.getElementById('statFav'),
      statFiltered: document.getElementById('statFiltered')
    };

    let students = [];
    let editId = null;
    let favoritesOnly = false;

    function normalize(text) {
      return (text || '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '');
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function mapsUrl(address) {
      return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(address);
    }

    function telUrl(phone) {
      return 'tel:' + String(phone || '').replace(/\s+/g, '');
    }

    function whatsappUrl(phone, name) {
      const digits = String(phone || '').replace(/\D/g, '');
      let international = digits;
      if (digits.startsWith('0')) international = '31' + digits.slice(1);
      return 'https://wa.me/' + international + '?text=' + encodeURIComponent('Hoi ' + name + ', even over je rijles.');
    }

    function sortStudents(list) {
      return [...list].sort((a, b) => {
        if (Boolean(a.favorite) !== Boolean(b.favorite)) {
          return Number(Boolean(b.favorite)) - Number(Boolean(a.favorite));
        }
        return a.name.localeCompare(b.name, 'nl', { sensitivity: 'base' });
      });
    }

    function filteredStudents() {
      const q = normalize(els.search.value);
      let list = sortStudents(students);

      if (favoritesOnly) {
        list = list.filter(s => Boolean(s.favorite));
      }

      if (!q) return list;

      return list.filter(s =>
        normalize(s.name).includes(q) ||
        normalize(s.address).includes(q) ||
        normalize(s.phone).includes(q) ||
        normalize(s.note).includes(q)
      );
    }

    function updateStats(list) {
      const favCount = students.filter(s => Boolean(s.favorite)).length;
      els.statTotal.textContent = students.length;
      els.statFav.textContent = favCount;
      els.statFiltered.textContent = list.length;
      els.countPill.textContent = list.length + (list.length === 1 ? ' leerling' : ' leerlingen');
    }

    function render() {
      const list = filteredStudents();
      updateStats(list);

      if (list.length === 0) {
        els.list.innerHTML = '<div class="empty">Geen leerlingen gevonden. Voeg iemand toe of pas je zoekopdracht aan.</div>';
        return;
      }

      const grouped = list.reduce((acc, student) => {
        const firstChar = (student.name || '#').trim().charAt(0).toUpperCase();
        const groupKey = /[A-ZÀ-ÖØ-Þ]/.test(firstChar) ? firstChar : '#';
        if (!acc[groupKey]) acc[groupKey] = [];
        acc[groupKey].push(student);
        return acc;
      }, {});

      const order = Object.keys(grouped).sort((a, b) => a.localeCompare(b, 'nl', { sensitivity: 'base' }));

      els.list.innerHTML = order.map(letter => `
        <section class="group">
          <div class="group-letter">${escapeHtml(letter)}</div>
          ${grouped[letter].map(student => `
            <article class="student">
              <div class="student-top">
                <div>
                  <h3 class="student-name">${student.favorite ? '⭐ ' : ''}${escapeHtml(student.name)}</h3>
                  <div class="student-meta">
                    <div>📍 ${escapeHtml(student.address)}</div>
                    ${student.phone ? `<div>📞 ${escapeHtml(student.phone)}</div>` : ''}
                    ${student.note ? `<div>📝 ${escapeHtml(student.note)}</div>` : ''}
                  </div>
                </div>
              </div>
              <div class="student-actions">
                <a class="btn btn-primary" href="${mapsUrl(student.address)}" target="_blank" rel="noopener noreferrer">Navigeer</a>
                ${student.phone ? `<a class="btn btn-warning" href="${telUrl(student.phone)}">Bel</a>` : ''}
                ${student.phone ? `<a class="btn btn-success" href="${whatsappUrl(student.phone, student.name)}" target="_blank" rel="noopener noreferrer">WhatsApp</a>` : ''}
                <button class="btn" onclick="editStudent('${student.id}')">Bewerk</button>
                <button class="btn btn-warning" onclick="toggleFavorite('${student.id}', ${Boolean(student.favorite)})">${student.favorite ? '★ Favoriet' : '☆ Favoriet'}</button>
                <button class="btn btn-danger" onclick="removeStudent('${student.id}', '${escapeHtml(student.name)}')">Verwijder</button>
              </div>
            </article>
          `).join('')}
        </section>
      `).join('');
    }

    async function loadStudents() {
      const { data, error } = await db
        .from('students')
        .select('*')
        .order('favorite', { ascending: false })
        .order('name', { ascending: true });

      if (error) {
        console.error(error);
        alert('Ophalen mislukt: ' + error.message);
        return;
      }

      students = data || [];
      render();
    }

    function toggleForm(force) {
      const willShow = typeof force === 'boolean' ? force : els.formBox.style.display === 'none';
      els.formBox.style.display = willShow ? 'block' : 'none';
      if (willShow) window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function clearForm() {
      els.name.value = '';
      els.address.value = '';
      els.phone.value = '';
      els.note.value = '';
      editId = null;
      els.formTitle.textContent = 'Nieuwe leerling';
    }

    function clearAndCloseForm() {
      clearForm();
      toggleForm(false);
    }

    function fillDemoForm() {
      els.name.value = 'Tom Janssen';
      els.address.value = 'Kerkstraat 12, Utrecht';
      els.phone.value = '0612345678';
      els.note.value = 'Altijd klaar bij de voordeur';
    }

    async function saveStudent() {
      const payload = {
        name: els.name.value.trim(),
        address: els.address.value.trim(),
        phone: els.phone.value.trim(),
        note: els.note.value.trim()
      };

      if (!payload.name || !payload.address) {
        alert('Vul naam en adres in.');
        return;
      }

      let result;
      if (editId) {
        result = await db.from('students').update(payload).eq('id', editId).select();
      } else {
        payload.favorite = false;
        result = await db.from('students').insert([payload]).select();
      }

      if (result.error) {
        console.error(result.error);
        alert('Opslaan mislukt: ' + result.error.message);
        return;
      }

      clearForm();
      toggleForm(false);
      await loadStudents();
    }

    async function toggleFavorite(id, currentState) {
      const { error } = await db.from('students').update({ favorite: !currentState }).eq('id', id);
      if (error) {
        console.error(error);
        alert('Favoriet aanpassen mislukt: ' + error.message);
        return;
      }
      await loadStudents();
    }

    async function removeStudent(id, name) {
      if (!confirm('Weet je zeker dat je ' + name + ' wilt verwijderen?')) return;
      const { error } = await db.from('students').delete().eq('id', id);
      if (error) {
        console.error(error);
        alert('Verwijderen mislukt: ' + error.message);
        return;
      }
      await loadStudents();
    }

    function editStudent(id) {
      const student = students.find(s => s.id === id);
      if (!student) return;
      editId = id;
      els.name.value = student.name || '';
      els.address.value = student.address || '';
      els.phone.value = student.phone || '';
      els.note.value = student.note || '';
      els.formTitle.textContent = 'Leerling bewerken';
      toggleForm(true);
    }

    function focusFavorites() {
      favoritesOnly = !favoritesOnly;
      render();
    }

    function voiceSearch() {
      const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!Recognition) {
        alert('Spraak zoeken wordt niet ondersteund op dit toestel.');
        return;
      }
      const recognition = new Recognition();
      recognition.lang = 'nl-NL';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      els.voiceBtn.textContent = '🎙️ Luistert';
      recognition.start();
      recognition.onresult = (event) => {
        els.search.value = event.results[0][0].transcript || '';
        render();
      };
      recognition.onerror = () => {
        els.voiceBtn.textContent = '🎤 Spraak';
      };
      recognition.onend = () => {
        els.voiceBtn.textContent = '🎤 Spraak';
      };
    }

    els.search.addEventListener('input', render);


    let deferredPrompt = null;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      const btn = document.getElementById('installBtn');
      if (btn) btn.style.display = 'inline-flex';
    });

    async function installDriveNav() {
      if (!deferredPrompt) {
        alert('Open deze site in Chrome op Android. Als installatie beschikbaar is, verschijnt de knop automatisch.');
        return;
      }
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      const btn = document.getElementById('installBtn');
      if (btn) btn.style.display = 'none';
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(console.error);
      });
    }

    loadStudents();
  </script>
</body>
</html>
